<svg width="100%" height="160" viewBox="0 0 1200 160" xmlns="http://www.w3.org/2000/svg">

  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffdf7"/>
      <stop offset="50%" stop-color="#f5ecd9"/>
      <stop offset="100%" stop-color="#ead9b8"/>
    </linearGradient>

    <!-- Accent Gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#f0a315"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect x="0" y="0" width="1200" height="160" fill="url(#bgGradient)" rx="20"/>

  <!-- Soft decorative circles -->
  <circle cx="150" cy="40" r="80" fill="#1e3a5f" opacity="0.06"/>
  <circle cx="1050" cy="120" r="100" fill="#f0a315" opacity="0.08"/>

  <!-- Curved travel path line -->
  <path d="M0 110 Q300 60 600 100 T1200 90"
        fill="none"
        stroke="url(#accentGradient)"
        stroke-width="3"
        stroke-dasharray="6,6"
        opacity="0.6"/>

  <!-- Airplane icon -->
  <path d="M900 50 l40 -10 l-25 20 l25 20 l-40 -10 l-15 20 l5 -25 l-30 -5 l30 -5 l-5 -25 z"
        fill="#1e3a5f"
        opacity="0.7"/>

  <!-- Location pin -->
  <path d="M250 90 
           c0 -15 12 -27 27 -27 
           s27 12 27 27 
           c0 20 -27 45 -27 45 
           s-27 -25 -27 -45z"
        fill="#f0a315"
        opacity="0.8"/>

  <!-- Inner pin circle -->
  <circle cx="277" cy="90" r="8" fill="#fff"/>

</svg>