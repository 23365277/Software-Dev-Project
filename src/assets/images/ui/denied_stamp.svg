<svg width="260" height="260" viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="roughInkDenied" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <filter id="softGrainDenied" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="15" result="grain"/>
      <feColorMatrix in="grain" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>

    <path id="topArcDenied" d="M 45 130 A 85 85 0 0 1 215 130" />
    <path id="bottomArcDenied" d="M 215 130 A 85 85 0 0 1 45 130" />
  </defs>

  <g transform="rotate(11 130 130)" filter="url(#roughInkDenied)">
    <!-- outer distressed rings -->
    <circle cx="130" cy="130" r="102" stroke="#B32929" stroke-width="7"/>
    <circle cx="130" cy="130" r="80" stroke="#B32929" stroke-width="3.5" stroke-dasharray="4 7"/>

    <!-- text around ring -->
    <text font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#B32929">
      <textPath href="#topArcDenied" startOffset="50%" text-anchor="middle">ROAMANCE</textPath>
    </text>
    <text font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="2.2" fill="#B32929">
      <textPath href="#bottomArcDenied" startOffset="50%" text-anchor="middle">ENTRY REFUSED</textPath>
    </text>

    <!-- center banner -->
    <g>
      <rect x="50" y="107" width="160" height="42" rx="4" stroke="#B32929" stroke-width="4" fill="none"/>
      <text x="130" y="137" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900" letter-spacing="2.5" fill="#B32929">
        DENIED
      </text>
    </g>

    <!-- extra details -->
    <text x="130" y="88" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" letter-spacing="2" fill="#B32929">
    </text>
    <text x="130" y="176" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="2.5" fill="#B32929">
      CHECKPOINT 07
    </text>

    <!-- X icon -->
    <g transform="translate(118 186)">
      <path d="M0 0L24 24M24 0L0 24" stroke="#B32929" stroke-width="5" stroke-linecap="round"/>
    </g>

    <!-- fake ink breaks -->
    <rect x="66" y="55" width="18" height="7" fill="white" opacity="0.7"/>
    <rect x="186" y="61" width="20" height="8" fill="white" opacity="0.75"/>
    <rect x="82" y="190" width="26" height="7" fill="white" opacity="0.6"/>
    <rect x="178" y="184" width="16" height="7" fill="white" opacity="0.65"/>
  </g>

  <!-- soft grain overlay -->
  <rect width="260" height="260" filter="url(#softGrainDenied)" opacity="0.3"/>
</svg>