<svg width="260" height="260" viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="roughInkApproved" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <filter id="softGrainApproved" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="11" result="grain"/>
      <feColorMatrix in="grain" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>

    <path id="topArcApproved" d="M 45 130 A 85 85 0 0 1 215 130" />
    <path id="bottomArcApproved" d="M 215 130 A 85 85 0 0 1 45 130" />
  </defs>

  <g transform="rotate(-12 130 130)" filter="url(#roughInkApproved)">
    <!-- outer distressed rings -->
    <circle cx="130" cy="130" r="98" stroke="#1C8B5A" stroke-width="7"/>
    <circle cx="130" cy="130" r="80" stroke="#1C8B5A" stroke-width="3.5" stroke-dasharray="4 7"/>

    <!-- text around ring -->
    <text font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#1C8B5A">
      <textPath href="#topArcApproved" startOffset="50%" text-anchor="middle">ROAMANCE</textPath>
    </text>
    <text font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="2.2" fill="#1C8B5A">
      <textPath href="#bottomArcApproved" startOffset="50%" text-anchor="middle">CLEARED FOR ENTRY</textPath>
    </text>

    <!-- center banner -->
    <g>
      <rect x="42" y="109" width="176" height="42" rx="4" stroke="#1C8B5A" stroke-width="5" fill="none"/>
      <text x="130" y="137" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900" letter-spacing=".25" fill="#1C8B5A">
        APPROVED
      </text>
    </g>

    <!-- small travel details -->
    <text x="130" y="88" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" letter-spacing="2" fill="#1C8B5A">
      
    </text>
    <text x="130" y="176" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="2.5" fill="#1C8B5A">
      CHECKPOINT 04
    </text>

    <!-- small plane icon -->
    <g transform="translate(117 187) scale(0.85)">
      <path d="M15 0L19 11L31 15L19 19L15 30L11 19L0 15L11 11L15 0Z" fill="#1C8B5A"/>
    </g>

    <!-- fake ink breaks -->
    <rect x="55" y="50" width="22" height="8" fill="white" opacity="0.75"/>
    <rect x="188" y="66" width="14" height="6" fill="white" opacity="0.7"/>
    <rect x="73" y="192" width="28" height="7" fill="white" opacity="0.6"/>
    <rect x="190" y="177" width="18" height="8" fill="white" opacity="0.65"/>
  </g>

  <!-- soft grain overlay -->
  <rect width="260" height="260" filter="url(#softGrainApproved)" opacity="0.3"/>
</svg>